apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuabaohiem-web
  namespace: vuabaohiem
  labels:
    app.kubernetes.io/name: vuabaohiem-web
    app.kubernetes.io/part-of: vuabaohiem-site
spec:
  # 2 replicas for HA + zero-downtime rolling deploys (matches qualityspace).
  # Leads persist to a shared RWO local-path PVC at /data (see volumes below);
  # the instant-email pipeline (notifyLead) is best-effort notification only.
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: vuabaohiem-web
  template:
    metadata:
      labels:
        app: vuabaohiem-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          # Image bumped by `make gitops` at every release.
          # Format: ghcr.io/vietcgi/vuabaohiem:<short-sha>-<UTC-yymmdd-hhmm>
          image: ghcr.io/vietcgi/vuabaohiem:340211d-20260721-1527
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            # Leads are written here, on a persistent volume (durable across
            # restarts). The app treats the file sink as durable because of the
            # flag below, so no external webhook is required.
            - name: VUABAOHIEM_DATA_DIR
              value: "/data"
            - name: VUABAOHIEM_LEAD_FILE_DURABLE
              value: "true"
            # Basic-Auth for /admin (the leads viewer), middleware.ts.
            # Secret created out-of-band: vuabaohiem-admin-auth.
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vuabaohiem-admin-auth
                  key: ADMIN_USERNAME
                  optional: true
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vuabaohiem-admin-auth
                  key: ADMIN_PASSWORD
                  optional: true
          # Lead pipeline destination. In production the app FAILS CLOSED (HTTP 500)
          # if no durable sink is reachable, so this secret MUST provide
          # VUABAOHIEM_LEAD_WEBHOOK_URL (a CRM/email/Zapier endpoint). Create it
          # out-of-band on the cluster, kept OUT of this PUBLIC repo:
          #   kubectl -n vuabaohiem create secret generic vuabaohiem-leads \
          #     --from-literal=VUABAOHIEM_LEAD_WEBHOOK_URL='https://...'
          # optional:true => pod still starts if absent (form then returns 500).
          envFrom:
            - secretRef:
                name: vuabaohiem-leads
                optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
            - name: leads-data
              mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir: {}
        - name: leads-data
          # Persistent: the app treats this file as a durable sink
          # (VUABAOHIEM_LEAD_FILE_DURABLE=true), so it must survive pod
          # restarts — the email notify is fire-and-forget and does NOT count
          # toward durability. RWO local-path is safe for 2 replicas because
          # this is a single-node cluster (both pods mount the same host dir);
          # revisit if the cluster ever gains a second node.
          persistentVolumeClaim:
            claimName: vuabaohiem-leads-data
