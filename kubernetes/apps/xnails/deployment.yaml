apiVersion: apps/v1
kind: Deployment
metadata:
  name: xnails-web
  namespace: xnails
  labels:
    app.kubernetes.io/name: xnails-web
    app.kubernetes.io/part-of: xnails-site
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: xnails-web
  template:
    metadata:
      labels:
        app: xnails-web
    spec:
      # Only needed if ghcr.io/vietcgi/xnails is PRIVATE. If you make the GHCR
      # package public (recommended for a static brochure site), delete this block.
      # To create it: seal a dockerconfigjson like qualityspace's ghcr-pull-secret.
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 101          # nginx-unprivileged
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          # Image + tag updated by deploy/build-push.sh + Makefile at every release.
          # Format: ghcr.io/vietcgi/xnails:<short-sha>-<UTC-yymmdd-hhmm>
          image: ghcr.io/vietcgi/xnails:05baeb6-20260703-1546
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
