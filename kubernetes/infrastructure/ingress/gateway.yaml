---
# Namespace for shared ingress resources
apiVersion: v1
kind: Namespace
metadata:
  name: ingress
---
# Wildcard TLS Certificate for *.qualityspace.com
# One cert covers all subdomains, avoids per-domain rate limits
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-qualityspace-tls
  namespace: ingress
spec:
  secretName: wildcard-qualityspace-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.qualityspace.com"
    - "qualityspace.com"
---
# Wildcard TLS Certificate for *.vuabaohiem.com (+ apex). DNS-01 via Cloudflare.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-vuabaohiem-tls
  namespace: ingress
spec:
  secretName: wildcard-vuabaohiem-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.vuabaohiem.com"
    - "vuabaohiem.com"
---
# Wildcard TLS Certificate for *.thienvienchanhtam.org (+ apex). DNS-01 via
# Cloudflare (requires the cloudflare-api-token to cover this zone; if it does
# not, switch issuerRef to the HTTP-01 issuer like xnails below).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-thienvienchanhtam-tls
  namespace: ingress
spec:
  secretName: wildcard-thienvienchanhtam-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.thienvienchanhtam.org"
    - "thienvienchanhtam.org"
---
# Shared Gateway for all services
# Uses wildcard cert for all *.qualityspace.com subdomains
# hostNetwork via Cilium - binds directly to host ports 80/443
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: ingress
spec:
  gatewayClassName: cilium
  listeners:
    # HTTP listener - for HTTP→HTTPS redirects and iPXE
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.qualityspace.com"
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener - wildcard cert covers all subdomains
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.qualityspace.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-qualityspace-tls
    # APEX listeners — Gateway API does NOT match apex via *.qualityspace.com.
    # Required for qualityspace.com (no subdomain) to route to qualityspace-web.
    # Wildcard cert above includes both *.qualityspace.com AND apex per dnsNames.
    - name: http-apex
      protocol: HTTP
      port: 80
      hostname: "qualityspace.com"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex
      protocol: HTTPS
      port: 443
      hostname: "qualityspace.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-qualityspace-tls
    # ---- vuabaohiem.com listeners (wildcard cert covers *.vuabaohiem.com + apex) ----
    - name: http-vbh
      protocol: HTTP
      port: 80
      hostname: "*.vuabaohiem.com"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-vbh
      protocol: HTTPS
      port: 443
      hostname: "*.vuabaohiem.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-qualityspace-tls
    - name: http-vbh-apex
      protocol: HTTP
      port: 80
      hostname: "vuabaohiem.com"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-vbh-apex
      protocol: HTTPS
      port: 443
      hostname: "vuabaohiem.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-qualityspace-tls
    # ---- thienvienchanhtam.org listeners (Cloudflare-fronted; terminates TLS so
    #      Cloudflare Full/Strict can complete the CF->origin hop, fixing 525) ----
    - name: http-tvct
      protocol: HTTP
      port: 80
      hostname: "*.thienvienchanhtam.org"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-tvct
      protocol: HTTPS
      port: 443
      hostname: "*.thienvienchanhtam.org"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-thienvienchanhtam-tls
    - name: http-tvct-apex
      protocol: HTTP
      port: 80
      hostname: "thienvienchanhtam.org"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-tvct-apex
      protocol: HTTPS
      port: 443
      hostname: "thienvienchanhtam.org"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-thienvienchanhtam-tls
    # ---- xnails.me listeners (Cloudflare-fronted; reuses wildcard cert on CF->origin hop) ----
    - name: http-xnails
      protocol: HTTP
      port: 80
      hostname: "*.xnails.me"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-xnails
      protocol: HTTPS
      port: 443
      hostname: "*.xnails.me"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: xnails-tls
    - name: http-xnails-apex
      protocol: HTTP
      port: 80
      hostname: "xnails.me"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-xnails-apex
      protocol: HTTPS
      port: 443
      hostname: "xnails.me"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: xnails-tls
---
# Let's Encrypt cert for xnails.me (+ www) via HTTP-01 (letsencrypt-http01).
# xnails.me DNS is outside the cloudflare-api-token zone scope, so DNS-01
# can't be used here; HTTP-01 through the gateway works instead.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: xnails-tls
  namespace: ingress
spec:
  secretName: xnails-tls
  issuerRef:
    name: letsencrypt-http01
    kind: ClusterIssuer
  dnsNames:
    - "xnails.me"
    - "www.xnails.me"
