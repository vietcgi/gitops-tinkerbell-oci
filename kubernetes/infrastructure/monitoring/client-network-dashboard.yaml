apiVersion: v1
kind: ConfigMap
metadata:
  name: client-network-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  client-network.json: |
    {
      "id": null,
      "uid": "client-network",
      "title": "Client Network Monitoring",
      "tags": ["client", "network", "monitoring", "eero"],
      "timezone": "browser",
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 10,
          "title": "Eero Mesh Node Status",
          "type": "stat",
          "gridPos": {"h": 4, "w": 24, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "eero_node_status{site=\"client-network\"}",
              "legendFormat": "{{location}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"options": {"0": {"text": "OFFLINE", "color": "red"}}, "type": "value"},
                {"options": {"1": {"text": "ONLINE", "color": "green"}}, "type": "value"}
              ],
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto"
          }
        },
        {
          "id": 11,
          "title": "Download Speed",
          "type": "gauge",
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 4},
          "targets": [
            {
              "expr": "eero_speed_download_mbps{site=\"client-network\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Mbps",
              "min": 0,
              "max": 1000,
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 100},
                  {"color": "green", "value": 500}
                ]
              }
            }
          }
        },
        {
          "id": 12,
          "title": "Upload Speed",
          "type": "gauge",
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 4},
          "targets": [
            {
              "expr": "eero_speed_upload_mbps{site=\"client-network\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Mbps",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "green", "value": 30}
                ]
              }
            }
          }
        },
        {
          "id": 13,
          "title": "Total Devices",
          "type": "stat",
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 4},
          "targets": [
            {
              "expr": "eero_total_devices{site=\"client-network\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [{"color": "blue", "value": null}]
              }
            }
          },
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 14,
          "title": "Online Devices",
          "type": "stat",
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 4},
          "targets": [
            {
              "expr": "eero_online_devices{site=\"client-network\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [{"color": "green", "value": null}]
              }
            }
          },
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "center"}
        },
        {
          "id": 15,
          "title": "Clients per Eero Node",
          "type": "bargauge",
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 9},
          "targets": [
            {
              "expr": "eero_node_clients{site=\"client-network\"}",
              "legendFormat": "{{location}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 20}
                ]
              },
              "min": 0,
              "max": 30
            }
          },
          "options": {"orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true}
        },
        {
          "id": 17,
          "title": "Mesh Quality (bars)",
          "type": "bargauge",
          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 9},
          "targets": [
            {
              "expr": "eero_node_mesh_quality{site=\"client-network\"}",
              "legendFormat": "{{location}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 3},
                  {"color": "green", "value": 4}
                ]
              },
              "min": 0,
              "max": 5
            }
          },
          "options": {"orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true}
        },
        {
          "id": 18,
          "title": "Device Signal Strength (dBm)",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 15},
          "targets": [
            {
              "expr": "eero_device_signal_dbm{site=\"client-network\"} != 0",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "dBm",
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": -70},
                  {"color": "green", "value": -50}
                ]
              },
              "min": -100,
              "max": 0
            }
          },
          "options": {"orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true}
        },
        {
          "id": 19,
          "title": "Device RX Speed (Mbps)",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 15},
          "targets": [
            {
              "expr": "eero_device_rx_rate_mbps{site=\"client-network\"} > 0",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Mbps",
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 100},
                  {"color": "green", "value": 400}
                ]
              },
              "min": 0,
              "max": 1000
            }
          },
          "options": {"orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true}
        },
        {
          "id": 16,
          "title": "Connected Devices",
          "type": "table",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 23},
          "targets": [
            {
              "expr": "eero_device_connected{site=\"client-network\"} == 1",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "host": true,
                  "instance": true,
                  "job": true,
                  "site": true,
                  "Value": true
                },
                "renameByName": {
                  "name": "Device",
                  "ip": "IP Address",
                  "mac": "MAC Address"
                }
              }
            }
          ],
          "fieldConfig": {"defaults": {"custom": {"align": "left"}}}
        }
      ],
      "schemaVersion": 38
    }
